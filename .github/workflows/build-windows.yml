name: Build Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build executable
        run: pyinstaller labelmate.spec --noconfirm

      - name: Verify bundled assets
        shell: pwsh
        run: |
          $logo = @(
            'dist/Labelmate/assets/kick_logo_1024-1.webp',
            'dist/Labelmate/_internal/assets/kick_logo_1024-1.webp'
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $logo) { throw 'Kick logo missing from build output' }
          Write-Host "Bundled logo: $logo"

      - name: Package zip
        shell: pwsh
        run: |
          if (Test-Path dist/Labelmate-windows.zip) { Remove-Item dist/Labelmate-windows.zip }
          Compress-Archive -Path dist/Labelmate/* -DestinationPath dist/Labelmate-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Labelmate-windows
          path: dist/Labelmate-windows.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Labelmate-windows.zip
          generate_release_notes: true
